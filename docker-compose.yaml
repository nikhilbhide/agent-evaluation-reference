version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8000:8080"
    environment:
      - GCP_PROJECT=${GCP_PROJECT}
    networks:
      - agent-network

  billing-agent:
    build:
      context: .
      dockerfile: agents/billing_agent/Dockerfile
    ports:
      - "8001:8080"
    environment:
      - GCP_PROJECT=${GCP_PROJECT}
      - MCP_SERVER_URL=http://mcp-server:8080
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/creds.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/tmp/creds.json:ro
    depends_on:
      - mcp-server
    networks:
      - agent-network

  technical-agent:
    build:
      context: .
      dockerfile: agents/technical_agent/Dockerfile
    ports:
      - "8002:8080"
    environment:
      - GCP_PROJECT=${GCP_PROJECT}
      - MCP_SERVER_URL=http://mcp-server:8080
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/creds.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/tmp/creds.json:ro
    depends_on:
      - mcp-server
    networks:
      - agent-network

  account-agent:
    build:
      context: .
      dockerfile: agents/account_agent/Dockerfile
    ports:
      - "8003:8080"
    environment:
      - GCP_PROJECT=${GCP_PROJECT}
      - MCP_SERVER_URL=http://mcp-server:8080
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/creds.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/tmp/creds.json:ro
    depends_on:
      - mcp-server
    networks:
      - agent-network

  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GCP_PROJECT=${GCP_PROJECT}
      - BILLING_AGENT_URL=http://billing-agent:8080
      - TECHNICAL_AGENT_URL=http://technical-agent:8080
      - ACCOUNT_AGENT_URL=http://account-agent:8080
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/creds.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/tmp/creds.json:ro
    depends_on:
      - billing-agent
      - technical-agent
      - account-agent
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
