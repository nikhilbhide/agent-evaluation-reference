# ── Canary Deployment — Dark Launch Variant ───────────────────────────────────
#
# PHASE 1: DARK LAUNCH (0% real traffic)
#
# The pod template intentionally has NO "app: customer-resolution-agent" label.
# This means the main Kubernetes Service (service.yaml) does NOT select this pod.
# Result: 0% of real user traffic reaches this pod.
#
# The canary-only Service at the bottom DOES select this pod (via version: canary),
# so the evaluation harness and sanity check can reach it directly and exclusively.
#
# PHASE TRANSITION (Dark → 20% Canary):
# Run scripts/enable_canary_traffic.sh after evaluation passes.
# That script adds the missing label to the pod, making the main Service pick it up.
# It also scales stable to 4 replicas so the split is:
#     stable: 4 replicas → ~80% traffic
#     canary: 1 replica  → ~20% traffic
#
# LIFECYCLE:
#   1. CD deploys this file           → 0% real traffic, eval happens
#   2. enable_canary_traffic.sh runs  → 20% real traffic, monitoring window
#   3a. promote_canary.sh runs        → 100% stable, canary scaled to 0
#   3b. rollback_canary.sh runs       → canary deleted, 100% back to stable

# ── Orchestrator Canary Deployment ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-resolution-agent-canary
  namespace: agent
  labels:
    app: customer-resolution-agent
    version: canary
    managed-by: cloud-build
spec:
  replicas: 1
  selector:
    matchLabels:
      version: canary
  template:
    metadata:
      labels:
        version: canary
    spec:
      serviceAccountName: agent-workload-sa
      containers:
        - name: orchestrator
          image: us-docker.pkg.dev/hr-policy-agent-486811/gcr.io/orchestrator:053a782
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT
              value: "hr-policy-agent-486811"
            - name: GCP_LOCATION
              value: "us-central1"
            - name: MODEL_NAME
              value: "gemini-2.5-flash"
            - name: MCP_SERVER_URL
              value: "http://mcp-server.agent.svc.cluster.local"
            - name: BILLING_AGENT_URL
              value: "http://billing-agent.agent.svc.cluster.local"
            - name: TECHNICAL_AGENT_URL
              value: "http://technical-agent.agent.svc.cluster.local"
            - name: ACCOUNT_AGENT_URL
              value: "http://account-agent.agent.svc.cluster.local"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            failureThreshold: 36
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: customer-resolution-agent-canary
  namespace: agent
spec:
  selector:
    version: canary
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
