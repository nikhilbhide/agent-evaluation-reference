# ── Workload Identity for GKE ─────────────────────────────────────────────────
#
# WHAT IS WORKLOAD IDENTITY?
# Instead of mounting a JSON key file into the pod (insecure, hard to rotate),
# Workload Identity lets a Kubernetes Service Account (KSA) impersonate a
# GCP Service Account (GSA). The pod gets GCP credentials automatically with
# no secrets to manage.
#
# SETUP (one-time, done by scripts/setup_gcp.sh):
#   1. Create the GCP Service Account (GSA)
#   2. Grant it roles/aiplatform.user
#   3. Allow the KSA to impersonate the GSA (IAM binding)
#   4. Annotate the KSA (this file)
#
# After applying this file, pods using serviceAccountName: agent-workload-sa
# automatically receive Vertex AI API credentials with no secrets needed.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-workload-sa
  namespace: agent
  annotations:
    # This annotation is what binds the KSA to the GCP Service Account.
    # Replace YOUR_PROJECT_ID with your actual project ID.
    iam.gke.io/gcp-service-account: agent-runtime@YOUR_PROJECT_ID.iam.gserviceaccount.com
