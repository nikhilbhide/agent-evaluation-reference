# ── Sub-Agent Deployments ──────────────────────────────────────────────────────
# Orchestrator is handled in the root stable/canary manifests.
# These specialists are managed here as stable-only microservices.

# ── Billing Agent ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-agent
  namespace: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-agent
  template:
    metadata:
      labels:
        app: billing-agent
    spec:
      serviceAccountName: agent-workload-sa
      containers:
        - name: billing-agent
          image: us-docker.pkg.dev/hr-policy-agent-486811/gcr.io/billing-agent:latest
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT
              value: "hr-policy-agent-486811"
            - name: GCP_LOCATION
              value: "us-central1"
            - name: MODEL_NAME
              value: "gemini-2.5-flash"
            - name: MCP_SERVER_URL
              value: "http://mcp-server.agent.svc.cluster.local"
---
apiVersion: v1
kind: Service
metadata:
  name: billing-agent
  namespace: agent
spec:
  selector:
    app: billing-agent
  ports:
    - port: 80
      targetPort: 8080

