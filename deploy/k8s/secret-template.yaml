# ── Kubernetes Secret Template ────────────────────────────────────────────────
#
# DO NOT commit secret.yaml (it's in .gitignore).
# This template shows the structure. Create it once with the command below.
#
# CREATE THE REAL SECRET:
#   kubectl create secret generic agent-config \
#     --namespace=agent \
#     --from-literal=gcp_project=hr-policy-agent-486811
#
# The secret is referenced by stable-deployment.yaml and canary-deployment.yaml
# as an environment variable:
#   env:
#     - name: GCP_PROJECT
#       valueFrom:
#         secretKeyRef:
#           name: agent-config
#           key: gcp_project

apiVersion: v1
kind: Secret
metadata:
  name: agent-config
  namespace: agent
type: Opaque
stringData:
  gcp_project: "hr-policy-agent-486811"    # ← Replace and apply manually, never commit
