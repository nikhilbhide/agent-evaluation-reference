# ── Main Production Service ────────────────────────────────────────────────────
#
# This Service selects ALL pods with label `app: customer-resolution-agent`,
# regardless of `version` (stable or canary).
#
# Kubernetes load-balances proportionally by pod count:
#   stable: 9 pods → 90% of traffic
#   canary: 1 pod  → 10% of traffic
#
# This is how real users experience the canary: most requests go to stable,
# a small fraction hit the new version. If the canary is bad, only ~10% of
# users are affected before we roll back.

apiVersion: v1
kind: Service
metadata:
  name: customer-resolution-agent
  namespace: agent
  labels:
    app: customer-resolution-agent
spec:
  # Selects BOTH stable and canary pods
  selector:
    app: customer-resolution-agent
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer   # Provision a GCP L4 load balancer for external access
