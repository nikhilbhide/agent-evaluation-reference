# ── ArgoCD Application: MCP Server ───────────────────────────────────────────
#
# An ArgoCD "Application" is the wiring between:
#   - A path in a git repo  (source of desired state)
#   - A Kubernetes namespace (where to apply it)
#
# HOW ARGOCD SYNC WORKS:
#   1. ArgoCD polls YOUR_REPO_URL every 3 minutes (or webhook in real setups).
#   2. It compares what's in deploy/k8s/mcp-server/ with what's in the cluster.
#   3. If they differ → it applies the git version (auto or manual sync).
#
# SYNC POLICY: "automated" with selfHeal:
#   - Someone runs kubectl manually and changes a value? ArgoCD reverts it.
#   - This enforces Git as the ONLY source of truth.
#   - No more "who ran kubectl directly?" mysteries.
#
# PRUNE: true
#   - If you delete a manifest from git, ArgoCD deletes the resource from the
#     cluster. Without this, deleted files leave orphaned resources forever.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-server
  namespace: argocd
  # This finalizer ensures ArgoCD cleans up resources when the Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: YOUR_REPO_URL
    targetRevision: main          # Watch the `main` branch
    path: deploy/k8s/mcp-server   # Only watch this subdirectory
  destination:
    server: https://kubernetes.default.svc   # The local cluster ArgoCD is in
    namespace: agent
  syncPolicy:
    automated:
      prune: true       # Delete resources removed from git
      selfHeal: true    # Revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
